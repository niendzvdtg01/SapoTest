version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: sapo_database
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: chatapp_database
      MYSQL_USER: admin
      MYSQL_PASSWORD: 1234
    ports:
      - "3310:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-scripts:/docker-entrypoint-initdb.d

volumes:
  mysql-data: