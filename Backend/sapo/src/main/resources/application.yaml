server:
    port: 8080

spring:
    main:
        banner-mode: off
    datasource:
        url: jdbc:mysql://localhost:3310/chatapp_database
        username: admin
        password: 1234
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: validate
            naming:
                physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
    data:
        redis:
            host: localhost
            port: 6379
            timeout: 60000
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest
        listener:
          simple:
            concurrency: 5
            max-concurrency: 10
            acknowledge-mode: auto

logging:
  level:
    org.springframework.boot.context.config: DEBUG